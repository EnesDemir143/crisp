name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bash 5.x (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bash
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"

      - name: Show bash version
        run: |
          /usr/bin/env bash --version
          echo "SHELLCHECK_SHELL: $(which bash)"

      - name: Install ShellCheck
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Install ShellCheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Install Bats
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: ShellCheck
        run: |
          shellcheck --version
          shellcheck -x lib/core/*.sh lib/modules/*.sh crisp install.sh

      - name: Run Bats tests
        run: |
          bats --version
          bats tests/
